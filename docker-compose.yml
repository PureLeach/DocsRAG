# DocsRAG infrastructure stack
#
# Setup mode: NATIVE OLLAMA (Variant A)
# Ollama runs natively on the host via `brew install ollama` to use Metal GPU acceleration.
# Services in this compose file reach Ollama at http://host.docker.internal:11434
#
# To switch to FULL DOCKER mode (Variant B), uncomment the `ollama` service below
# and change OLLAMA_BASE_URL in API service (added in Task 3) to http://ollama:11434.
# Variant B is slower on Mac (CPU-only inside Docker on Apple Silicon)
# but provides single-command startup for demos.

services:
  qdrant:
    image: qdrant/qdrant:v1.17
    container_name: docsrag-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC API
    volumes:
      # - ./qdrant_storage:/qdrant/storage
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      # /healthz is plain HTTP 200 with no body — works with default slim image
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/6333 && echo -e 'GET /healthz HTTP/1.0\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q 200"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ===== Variant B (Ollama in Docker) — uncomment to switch =====
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: docsrag-ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   restart: unless-stopped
  # If you enable this:
  #   1. Set OLLAMA_BASE_URL: "http://ollama:11434" in api.environment
  #   2. Remove the extra_hosts block from api
  #   3. Add `ollama` to api.depends_on
  #   4. After first start: docker exec -it docsrag-ollama ollama pull qwen2.5:7b-instruct-q4_K_M


  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docsrag-api
    ports:
      - "8000:8000"
    environment:
      # Qdrant lives in this compose network — use the service name.
      QDRANT_URL: "${QDRANT_URL:-http://qdrant:6333}"
      QDRANT_COLLECTION: "${QDRANT_COLLECTION:-docsrag}"
      # Variant A: Ollama runs natively on the host. From the container,
      # we reach it via host.docker.internal (mapped below in extra_hosts).
      # Variant B (Ollama in Docker): change OLLAMA_BASE_URL to http://ollama:11434
      INFERENCE_BACKEND: "${INFERENCE_BACKEND:-ollama}"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://host.docker.internal:11434}"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-qwen2.5:7b-instruct-q4_K_M}"
      VLLM_BASE_URL: "${VLLM_BASE_URL:-http://host.docker.internal:8001/v1}"
      VLLM_MODEL: "${VLLM_MODEL:-mlx-community/Qwen2.5-7B-Instruct-4bit}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-BAAI/bge-small-en-v1.5}"
      EMBEDDING_DIM: "${EMBEDDING_DIM:-384}"
      HF_TOKEN: "${HF_TOKEN}"
      LANGFUSE_PUBLIC_KEY: "${LANGFUSE_PUBLIC_KEY}"
      LANGFUSE_SECRET_KEY: "${LANGFUSE_SECRET_KEY}"
      LANGFUSE_BASE_URL: "${LANGFUSE_BASE_URL:-https://cloud.langfuse.com}"
    extra_hosts:
      # Required on Linux for host.docker.internal to resolve.
      # On Docker Desktop (macOS) it's already mapped, but specifying it
      # explicitly makes the compose file portable. Harmless on macOS.
      - "host.docker.internal:host-gateway"
    volumes:
      # Persist HuggingFace model cache so we don't redownload bge-small
      # on every container rebuild.
      - hf_cache:/app/.cache/huggingface
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.4.0
    container_name: docsrag-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
    depends_on:
      - api
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.0.1
    container_name: docsrag-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "admin"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: "/var/lib/grafana/dashboards/docsrag.json"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.18.0
    container_name: docsrag-mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    command: >
      mlflow server
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    restart: unless-stopped

networks:
  default:
    name: docsrag-network

volumes:
  qdrant_storage:
  hf_cache:
  mlflow_data:
  prometheus_data:
  grafana_data:
  # ollama_data:  # uncomment for Variant B