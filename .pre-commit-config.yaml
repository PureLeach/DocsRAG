repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-format
      - id: ruff-check
        args: ["--fix", "--unsafe-fixes"]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        pass_filenames: false
        args:
          - "--config-file=pyproject.toml"
          - "."
        additional_dependencies:
          - pydantic
          - pydantic-settings
          - types-requests
          - types-aiofiles
